<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Prediction Chart</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #1a1a2e;
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #4facfe;
            text-shadow: 0 0 10px rgba(79, 172, 254, 0.3);
            margin-bottom: 5px;
        }

        .subtitle {
            color: #a0a0a0;
            margin-bottom: 30px;
        }

        .chart-container {
            width: 80%;
            max-width: 900px;
            background: #2c2c2c;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 30px;
        }

        .nav-link {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: rgba(79, 172, 254, 0.2);
            color: #4facfe;
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid #4facfe;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background: #4facfe;
            color: #1a1a2e;
            box-shadow: 0 0 15px rgba(79, 172, 254, 0.5);
        }
    </style>
</head>

<body>

    <h1>Traffic vs ML Predicted Traffic</h1>
    <p class="subtitle">Live analysis of total intersection volume</p>

    <div class="chart-container">
        <canvas id="trafficChart"></canvas>
    </div>

    <a href="index.html" class="nav-link">← Back to Simulator</a>

    <script src="chart_script.js"></script>
</body>

</html>
